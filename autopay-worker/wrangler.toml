name = "meteria402-autopay-worker"
main = "src/index.ts"
compatibility_date = "2026-04-28"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
preview_urls = false

routes = [
  { pattern = "autopay.longern.com", zone_name = "longern.com", custom_domain = true }
]

[vars]
AUTOPAY_ADMIN_OWNER = "0x9bb3c3042df4fc0cfa441e0e9f7dc7aa25ea7ef1"

# D1 database ID needs to be set after creating the database via:
#   npx wrangler d1 create meteria402_autopay_audit
# Then copy the database_id here.
[[d1_databases]]
binding = "DB"
database_name = "meteria402_autopay_audit"
database_id = "01e6a8bc-fe69-4a48-80d6-d9032c37f751"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "AUTOPAY_AUTH_SESSIONS"
class_name = "AutopayAuthSession"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AutopayAuthSession"]

[assets]
directory = "./dist/client"
html_handling = "auto-trailing-slash"
not_found_handling = "none"
run_worker_first = ["/authorize", "/api/*"]
