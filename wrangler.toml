name = "meteria402"
main = "src/index.ts"
compatibility_date = "2026-04-28"

routes = [
  { pattern = "meteria402.longern.com", zone_name = "longern.com", custom_domain = true }
]

[assets]
directory = "./dist/client"
html_handling = "auto-trailing-slash"
not_found_handling = "single-page-application"
run_worker_first = [
  "/api/*",
  "/v1/*",
  "/compat/*",
  "/anthropic/*",
  "/google-ai-studio/*",
  "/openrouter/*",
  "/mistral/*",
  "/groq/*",
  "/deepseek/*",
  "/perplexity/*",
  "/grok/*",
  "/workers-ai/*",
  "/azure-openai/*",
  "/cohere/*",
  "/replicate/*",
  "/huggingface/*",
  "/health",
]

[ai]
binding = "AI"

[[durable_objects.bindings]]
name = "LOGIN_SESSIONS"
class_name = "LoginSession"

[[migrations]]
tag = "v1_login_sessions"
new_sqlite_classes = ["LoginSession"]

[[d1_databases]]
binding = "DB"
database_name = "meteria402"
database_id = "01e6a8bc-fe69-4a48-80d6-d9032c37f751"
migrations_dir = "migrations"

[observability.logs]
enabled = true

[triggers]
crons = ["*/5 * * * *"]

[vars]
CLOUDFLARE_ACCOUNT_ID = "47d267b33cc0b14271613d84942946bb"
AI_GATEWAY_ID = "default"
X402_ASSET_DECIMALS = "6"
DEFAULT_MIN_DEPOSIT = "5.00"
DEFAULT_CONCURRENCY_LIMIT = "1"
DEFAULT_INPUT_MICRO_USD_PER_TOKEN = "1"
DEFAULT_OUTPUT_MICRO_USD_PER_TOKEN = "4"
ALLOW_DEV_PAYMENTS = "false"

# Set secrets with wrangler:
# wrangler secret put CLOUDFLARE_ACCOUNT_ID
# wrangler secret put CLOUDFLARE_API_TOKEN
# wrangler secret put AI_GATEWAY_API_KEY
# wrangler secret put AI_GATEWAY_AUTH_TOKEN
# wrangler secret put X402_RECIPIENT_ADDRESS
# wrangler secret put X402_FACILITATOR_AUTH_TOKEN
